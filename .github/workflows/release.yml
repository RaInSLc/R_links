name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'mod_UI/package-lock.json'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'mod_UI/src-tauri -> target'

      - name: install frontend dependencies
        working-directory: mod_UI
        run: npm ci

      - uses: tauri-apps/tauri-action@v0.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: mod_UI
          tagName: v__VERSION__
          releaseName: 'R Package Command Center v__VERSION__'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

      - name: Rename portable exe
        run: copy mod_UI\src-tauri\target\release\mod_ui.exe mod_UI\src-tauri\target\release\R_Package_Command_Center_Portable.exe

      - name: Upload Portable Executable
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          files: mod_UI/src-tauri/target/release/R_Package_Command_Center_Portable.exe
