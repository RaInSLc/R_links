name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest
    env:
      CARGO_TARGET_DIR: target/ci_target
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'mod_UI/package-lock.json'

      - name: Check Version Consistency
        working-directory: mod_UI
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
          const cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
          const cargoVersion = cargo.match(/^version\s*=\s*\"([^\"]+)\"/m)[1];
          console.log('package.json version:', pkg.version);
          console.log('tauri.conf.json version:', tauri.version);
          console.log('Cargo.toml version:', cargoVersion);
          if (pkg.version !== tauri.version || pkg.version !== cargoVersion) {
            console.error('Error: Version mismatch detected!');
            process.exit(1);
          }
          console.log('Version check passed!');
          "

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'mod_UI/src-tauri -> target'

      - name: install frontend dependencies
        working-directory: mod_UI
        run: npm ci

      - name: frontend tests
        working-directory: mod_UI
        run: npm test

      - name: Rust format check
        working-directory: mod_UI/src-tauri
        run: cargo fmt -- --check

      - name: Rust clippy
        working-directory: mod_UI/src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Rust tests
        working-directory: mod_UI/src-tauri
        run: cargo test --locked

      - name: Tauri build (no bundle)
        working-directory: mod_UI
        run: npm run tauri build -- --no-bundle
