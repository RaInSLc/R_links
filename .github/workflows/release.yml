name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v0.1.10"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows release
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mod_UI/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: mod_UI/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: mod_UI
        run: npm ci

      - name: Validate release tag
        shell: pwsh
        run: |
          if ($env:RELEASE_TAG -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must match vX.Y.Z, got '$env:RELEASE_TAG'"
          }
          $packageVersion = (Get-Content -LiteralPath "mod_UI\package.json" -Raw | ConvertFrom-Json).version
          if ($env:RELEASE_TAG -ne "v$packageVersion") {
            throw "Release tag $env:RELEASE_TAG does not match package.json version v$packageVersion"
          }

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: mod_UI
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: ${{ env.RELEASE_TAG }} - R Package Command Center
          releaseBody: |
            Automated Windows release for R Package Command Center.

            This release must include latest.json for the Tauri updater.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      - name: Rename portable executable
        shell: pwsh
        run: |
          Copy-Item -LiteralPath "mod_UI\src-tauri\target\release\mod_ui.exe" -Destination "mod_UI\src-tauri\target\release\R_Package_Command_Center_Portable.exe" -Force

      - name: Upload portable executable
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          files: |
            mod_UI/src-tauri/target/release/R_Package_Command_Center_Portable.exe

      - name: Validate updater manifest
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:RELEASE_TAG
          New-Item -ItemType Directory -Path "updater-check" -Force | Out-Null
          gh release download $tag --pattern "latest.json" --dir "updater-check" --clobber
          $manifestPath = Join-Path "updater-check" "latest.json"
          if (-not (Test-Path -LiteralPath $manifestPath)) {
            throw "latest.json was not uploaded to release $tag"
          }
          $manifest = Get-Content -LiteralPath $manifestPath -Raw | ConvertFrom-Json
          if (-not $manifest.version) {
            throw "latest.json is missing version"
          }
          $packageVersion = (Get-Content -LiteralPath "mod_UI\package.json" -Raw | ConvertFrom-Json).version
          if ($manifest.version -ne $packageVersion) {
            throw "latest.json version $($manifest.version) does not match package.json version $packageVersion"
          }
          if (-not $manifest.platforms) {
            throw "latest.json is missing platforms"
          }
          $platforms = $manifest.platforms.PSObject.Properties
          if ($platforms.Count -lt 1) {
            throw "latest.json platforms is empty"
          }
          foreach ($platform in $platforms) {
            if (-not $platform.Value.url) {
              throw "latest.json platform $($platform.Name) is missing url"
            }
            if (-not $platform.Value.signature) {
              throw "latest.json platform $($platform.Name) is missing signature"
            }
          }

      - name: Publish verified release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit $env:RELEASE_TAG --draft=false
