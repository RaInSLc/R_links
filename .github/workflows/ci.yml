name: CI

on:
  push:
    branches: [ main, master ]
    tags-ignore: ['v*']
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest
    env:
      CARGO_TARGET_DIR: target/ci_target
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'mod_UI/package-lock.json'

      - name: Check Version Consistency
        working-directory: mod_UI
        run: |
          $pkg = (Get-Content 'package.json' -Raw | ConvertFrom-Json).version
          $tauri = (Get-Content 'src-tauri/tauri.conf.json' -Raw | ConvertFrom-Json).version
          $cargo = Select-String '^version\s*=\s*"([^"]+)"' 'src-tauri/Cargo.toml'
          $cargoVersion = $cargo.Matches[0].Groups[1].Value
          Write-Host "package.json version: $pkg"
          Write-Host "tauri.conf.json version: $tauri"
          Write-Host "Cargo.toml version: $cargoVersion"
          if ($pkg -ne $tauri -or $pkg -ne $cargoVersion) {
            Write-Error 'Error: Version mismatch detected!'
            exit 1
          }
          Write-Host 'Version check passed!'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'mod_UI/src-tauri -> target'

      - name: install frontend dependencies
        working-directory: mod_UI
        run: npm ci

      - name: frontend tests
        working-directory: mod_UI
        run: npm test

      - name: Rust format check
        working-directory: mod_UI/src-tauri
        run: cargo fmt -- --check

      - name: Rust clippy
        working-directory: mod_UI/src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Rust tests
        working-directory: mod_UI/src-tauri
        run: cargo test --locked

      - name: Tauri build (no bundle)
        working-directory: mod_UI
        run: npm run tauri build -- --no-bundle
