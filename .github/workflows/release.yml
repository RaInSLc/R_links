name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'mod_UI/package-lock.json'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'mod_UI/src-tauri -> target'

      - name: install frontend dependencies
        working-directory: mod_UI
        run: npm ci

      - uses: tauri-apps/tauri-action@v0.5.3
        id: tauri-build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: mod_UI
          tagName: v__VERSION__
          releaseName: 'R Package Command Center v__VERSION__'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: true

      - name: Rename portable exe
        run: copy mod_UI\src-tauri\target\release\mod_ui.exe mod_UI\src-tauri\target\release\R_Package_Command_Center_Portable.exe

      - name: Verify latest.json content
        working-directory: mod_UI
        run: |
          $jsonPath = "src-tauri\target\release\bundle\windows\latest.json"
          if (-not (Test-Path $jsonPath)) {
            Write-Error "latest.json not found at $jsonPath"
            exit 1
          }
          $pkg = (Get-Content 'package.json' -Raw | ConvertFrom-Json).version
          $json = Get-Content $jsonPath | ConvertFrom-Json
          if (-not $json.version -or -not $json.platforms."windows-x86_64".url -or -not $json.platforms."windows-x86_64".signature) {
            Write-Error "latest.json is missing required fields (version, url, signature)"
            exit 1
          }
          if ($json.version -ne $pkg) {
            Write-Error "latest.json version ($($json.version)) does not match package.json version ($pkg)"
            exit 1
          }
          if ($json.platforms."windows-x86_64".signature -eq "REPLACE_WITH_SIGNATURE") {
            Write-Error "latest.json still contains REPLACE_WITH_SIGNATURE"
            exit 1
          }
          if ($json.platforms."windows-x86_64".url -notmatch "^https://github\.com/RaInSLc/R_links/releases/download/v$([regex]::Escape($pkg))/") {
            Write-Error "latest.json download URL does not point to the expected release version v$pkg"
            exit 1
          }
          Write-Host "latest.json verification passed."

      - name: Upload Additional Assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          draft: true
          files: |
            mod_UI/src-tauri/target/release/R_Package_Command_Center_Portable.exe
            mod_UI/src-tauri/target/release/bundle/windows/latest.json

      - name: Publish verified release
        working-directory: mod_UI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $pkg = (Get-Content 'package.json' -Raw | ConvertFrom-Json).version
          gh release edit "v$pkg" --draft=false
